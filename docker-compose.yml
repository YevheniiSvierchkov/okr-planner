services:
  db:
    image: postgres:16-alpine
    container_name: okr-planner-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: okr
      POSTGRES_PASSWORD: okr
      POSTGRES_DB: okr_planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okr -d okr_planner"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      target: development
    container_name: okr-planner-backend
    restart: unless-stopped
    ports:
      - "8877:8877"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: okr-planner-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
volumes:
  postgres_data:
