services:
  db:
    image: postgres:16-alpine
    container_name: okr-planner-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: okr
      POSTGRES_PASSWORD: okr
      POSTGRES_DB: okr_planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okr -d okr_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: